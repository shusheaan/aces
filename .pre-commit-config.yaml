repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: .venv/bin/ruff format --check
        types: [python]

      - id: ruff-check
        name: ruff check
        language: system
        entry: .venv/bin/ruff check
        types: [python]

      - id: mypy
        name: mypy
        language: system
        entry: .venv/bin/mypy
        types: [python]
        args: [--ignore-missing-imports]

      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --check
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --workspace -- -D warnings
        pass_filenames: false
        types: [rust]

      - id: cargo-test-core
        name: cargo test core
        language: system
        entry: cargo test -p aces-sim-core -p aces-batch-sim -p aces-mppi -p aces-estimator --lib
        pass_filenames: false
        files: ^(crates/(sim-core|batch-sim|mppi|estimator)/|Cargo\.toml|Cargo\.lock)
        stages: [pre-commit]

      - id: pytest-core
        name: pytest core
        language: system
        entry: bash scripts/test-python-core.sh
        pass_filenames: false
        files: ^(aces|tests|configs|scripts)/|^(pyproject\.toml|poetry\.lock)$
        stages: [pre-commit]
